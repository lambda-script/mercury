name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `npx @lambda-script/mercury`
        2. Send a request with ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Mercury Version
      description: Output of `npx @lambda-script/mercury --version` or package.json version.
      placeholder: "0.2.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Output of `node --version`.
      placeholder: "v20.11.0"
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: Translation Backend
      options:
        - google-free
        - haiku
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context (logs, screenshots, environment details).
